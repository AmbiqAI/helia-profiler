# VWW (Visual Wake Words, MobileNet-based int8) on Apollo510 EVB (non-B
# variant) via heliaRT — PMU + Joulescope power capture.
#
# GCC toolchain, RTT transport, MRAM weights / TCM arena placement, LP
# (96 MHz) clock, to match the AutoDeploy baseline (Perfresults.xlsx, sheet
# AP510, gcc, ns_tflm_2025_02_14, VWW row): 80.783ms, 675.34uJ/inf, 8.360mW.
model:
  path: tests/fixtures/mlperf_tiny/vww/vww_96_int8.tflite
  arena_size: 112640
  weights_location: mram
  arena_location: tcm

engine:
  type: helia-rt

target:
  board: apollo510_evb
  toolchain: atfe
  jlink_serial: "1160002204"
  transport: rtt
  clock:
    cpu: lp

profiling:
  pmu_counters:
    cpu: default
    mve: default
    memory: default
  per_layer: true
  iterations: 200
  warmup: 10
  aggregation: median

power:
  enabled: true
  driver: joulescope
  mode: external
  duration_s: 45
  io_voltage: 1.8
  firmware: dedicated
  lockstep: true

output:
  format: json
  dir: ./results/mlperf_tiny/vww_rt_power_ap510_atfe
  model_explorer: false
  detailed: true

keep_work_dir: true
