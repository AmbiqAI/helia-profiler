# VWW (Visual Wake Words, MobileNet-based int8) on Apollo330mP EVB (Rev 1)
# via heliaRT — PMU + Joulescope power capture.
#
# apollo330mP_evb has no board-specific GPIO sync wiring registered in
# board.py yet -- explicit overrides here use the same J8 header pins
# validated on the KWS AP330 run: GP5 (sync/gate), GP6 (state), GP7 (go).
#
# VWW's ~326KB model doesn't fit AP330's 240KB TCM, so weights go to
# MRAM. IMPORTANT: unlike AP510 (vww_rt_power_ap510.yaml uses TCM
# arena), AutoDeploy's OWN AP330P baseline places the arena in SRAM, not
# TCM (Latest_AI_Results.xlsx, sheet AP330P, VWW row: "Arena Location" =
# SRAM) -- copying the AP510 TCM-arena convention here would NOT be an
# apples-to-apples comparison. Match AD's real placement.
#
# GCC toolchain, RTT transport, LP (96 MHz) clock. AD baseline (gcc,
# LP): 73.145ms, 479.12uJ/inf, 6.550mW.
model:
  path: tests/fixtures/mlperf_tiny/vww/vww_96_int8.tflite
  arena_size: 112640
  weights_location: mram
  arena_location: sram

engine:
  type: helia-rt

target:
  board: apollo330mP_evb
  toolchain: arm-none-eabi-gcc
  jlink_serial: "1160003058"
  transport: rtt
  clock:
    cpu: lp

profiling:
  pmu_counters:
    cpu: default
    mve: default
    memory: default
  per_layer: true
  iterations: 200
  warmup: 10
  aggregation: median

power:
  enabled: true
  driver: joulescope
  mode: external
  duration_s: 45
  io_voltage: 1.8
  firmware: dedicated
  lockstep: true
  sync_gpio_pin: 5
  state_gpio_pin: 6
  go_gpio_pin: 7

output:
  format: json
  dir: ./results/mlperf_tiny/vww_rt_power_ap330
  model_explorer: false
  detailed: true

keep_work_dir: true
