# IC (Image Classification, ResNet int8) on Apollo510 EVB (non-B variant)
# via heliaAOT — full TCM/TCM placement, ATfE toolchain.
#
# Part of a "best possible result" sweep across all 4 MLPerf Tiny models
# using heliaAOT + ATfE + full TCM residency.
model:
  path: tests/fixtures/mlperf_tiny/ic/ic_resnet_int8.tflite
  arena_size: 57344
  weights_location: tcm
  arena_location: tcm
engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model

target:
  board: apollo510_evb
  toolchain: atfe
  jlink_serial: "1160002204"
  transport: rtt
  clock:
    cpu: hp

profiling:
  pmu_counters:
    cpu: default
    mve: default
    memory: default
  per_layer: true
  iterations: 200
  warmup: 10
  aggregation: median

power:
  enabled: true
  driver: joulescope
  mode: external
  duration_s: 45
  io_voltage: 1.8
  firmware: dedicated
  lockstep: true

output:
  format: json
  dir: ./results/mlperf_tiny/ic_aot_power_ap510_atfe_tcm_hp
  model_explorer: false
  detailed: true

