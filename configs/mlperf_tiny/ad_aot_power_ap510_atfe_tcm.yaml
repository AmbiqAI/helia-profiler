# AD (Anomaly Detection, autoencoder int8) on Apollo510 EVB (non-B variant)
# via heliaAOT — full TCM/TCM placement, ATfE toolchain.
#
# Extended gated power window (window_target_ms/window_max) since AD's
# per-inference time is extremely short (~0.7-1.4ms); a longer window
# (several seconds, thousands of inferences) avoids GPIO-edge/gate-boundary
# timing jitter dominating the measurement for this particular model.
#
# Part of a "best possible result" sweep across all 4 MLPerf Tiny models
# using heliaAOT + ATfE + full TCM residency.
model:
  path: tests/fixtures/mlperf_tiny/ad/ad01_int8.tflite
  arena_size: 10240
  model_location: tcm

engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model

target:
  board: apollo510_evb
  toolchain: atfe
  jlink_serial: "1160002204"
  transport: rtt
  clock:
    cpu: lp

profiling:
  pmu_counters:
    cpu: default
    mve: default
    memory: default
  per_layer: true
  iterations: 200
  warmup: 10
  aggregation: median
  window_target_ms: 8000
  window_max: 10000

power:
  enabled: true
  driver: joulescope
  mode: external
  duration_s: 45
  io_voltage: 1.8
  firmware: dedicated
  lockstep: true

output:
  format: json
  dir: ./results/mlperf_tiny/ad_aot_power_ap510_atfe_tcm
  model_explorer: false
  detailed: true

keep_work_dir: true
