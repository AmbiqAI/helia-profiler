# KWS on the Apollo510 EVB connected to a Joulescope JS320.
#
# The JS320 uses the JS220-style statistics topics but does not expose the
# GPO topic used by hpx's 3-wire lockstep controller. hpx therefore
# automatically falls back to gate-only capture for this instrument while
# continuing to poll the firmware's GPI gate.
#
# Hardware validated 2026-07-11:
#   J-Link:    1160002255 (AP510 candidate; 1160003058 is the known AP330)
#   Joulescope: 25QG (JS320)
#   KWS/gcc/LP: 21.145ms, 142.15uJ/inf, 6.730mW
model:
  path: tests/fixtures/mlperf_tiny/kws/kws_ref_model.tflite
  arena_size: 32768
  model_location: tcm

engine:
  type: helia-rt

target:
  board: apollo510_evb
  toolchain: arm-none-eabi-gcc
  jlink_serial: "1160002255"
  transport: rtt
  clock:
    cpu: lp

profiling:
  pmu_counters:
    cpu: default
    mve: default
    memory: default
  per_layer: true
  iterations: 200
  warmup: 10
  aggregation: median

power:
  enabled: true
  driver: joulescope-js320
  serial: "25QG"
  mode: external
  duration_s: 45
  io_voltage: 1.8
  firmware: dedicated
  lockstep: true

output:
  format: json
  dir: ./results/mlperf_tiny/kws_rt_power_ap510_js320
  model_explorer: false
  detailed: true

keep_work_dir: true
