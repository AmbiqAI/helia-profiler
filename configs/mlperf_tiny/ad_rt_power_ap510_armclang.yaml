# AD (Anomaly Detection, autoencoder int8) on Apollo510 EVB (non-B variant)
# via heliaRT — PMU + Joulescope power capture.
#
# GCC toolchain, RTT transport, TCM/TCM placement, LP (96 MHz) clock, to
# match the AutoDeploy baseline.
model:
  path: tests/fixtures/mlperf_tiny/ad/ad01_int8.tflite
  arena_size: 10240
  weights_location: tcm
  arena_location: tcm
engine:
  type: helia-rt

target:
  board: apollo510_evb
  toolchain: armclang
  jlink_serial: "1160002204"
  transport: rtt
  clock:
    cpu: lp

profiling:
  pmu_counters:
    cpu: default
    mve: default
    memory: default
  per_layer: true
  iterations: 200
  warmup: 10
  aggregation: median

power:
  enabled: true
  driver: joulescope
  mode: external
  duration_s: 45
  io_voltage: 1.8
  firmware: dedicated
  lockstep: true

output:
  format: json
  dir: ./results/mlperf_tiny/ad_rt_power_ap510_armclang
  model_explorer: false
  detailed: true

