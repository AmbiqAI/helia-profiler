# Oura workshop: KWS on Apollo330 Plus EVB via heliaAOT.
#
# Explicit AIR tensor placement. Scratch and persistent tensors use DTCM;
# constants stay in MRAM as their non-volatile source and are hydrated into
# DTCM at runtime. This is the TCM-heavy configuration for the first run:
# the profiler's real AP330 linker map will report the total firmware,
# scratch, persistent, and hydrated-constant residency. If it does not fit
# AP330's 240 KB usable TCM, move persistent first, then constant destinations
# to SRAM while retaining MRAM as the cold constant source.
model:
  path: tests/fixtures/mlperf_tiny/kws/kws_ref_model.tflite
  arena_size: 32768

engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model
    aot_args:
      memory:
        tensors:
          - type: scratch
            attributes:
              memory: dtcm
          - type: persistent
            attributes:
              memory: dtcm
          - type: constant
            attributes:
              memory: mram
              constant_destination_memory: dtcm

target:
  board: apollo330mP_evb
  toolchain: arm-none-eabi-gcc
  jlink_serial: "1160003058"
  transport: rtt
  clock:
    cpu: lp

profiling:
  pmu_counters:
    cpu: default
    mve: default
    memory: default
  per_layer: true
  iterations: 200
  warmup: 10
  aggregation: median

power:
  enabled: true
  driver: joulescope
  serial: "004204"
  mode: external
  duration_s: 45
  io_voltage: 1.8
  firmware: dedicated
  lockstep: true
  sync_gpio_pin: 5
  state_gpio_pin: 6
  go_gpio_pin: 7

output:
  format: json
  dir: ./experiments/oura-workshop/results/kws_aot_ap330_js110
  model_explorer: false
  detailed: true

keep_work_dir: true
