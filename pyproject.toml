[project]
name = "helia-profiler"
version = "0.1.0"
description = "Profile LiteRT models on Ambiq Apollo hardware"
requires-python = ">=3.11,<3.13"
license = {text = "Apache-2.0"}
dependencies = [
    "Jinja2>=3.1",
    "PyYAML>=6.0",
    "rich>=13.0",
]

[project.optional-dependencies]
aot = ["helia-aot @ git+https://github.com/AmbiqAI/helia-aot.git@feat/nsx-module-type"]
power = ["joulescope>=1.0"]
power-js220 = ["pyjoulescope_driver>=1.0"]
power-all = ["joulescope>=1.0", "pyjoulescope_driver>=1.0"]

[project.scripts]
hpx = "helia_profiler.cli:main"

[dependency-groups]
lint = ["ruff>=0.11.0"]
test = ["pytest>=8.0", "pytest-timeout>=2.3"]
docs = [
    "mkdocs-material>=9.0",
    "pymdown-extensions>=10.15",
    "zensical>=0.0.11",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["helia_profiler", "helia_profiler.*"]

[tool.setuptools.package-data]
helia_profiler = ["firmware/templates/**/*", "engines/templates/**/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
