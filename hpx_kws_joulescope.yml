# heliaPROFILER config — KWS model with Joulescope power capture
model:
  path: tests/fixtures/kws_ref_model.tflite
  arena_size: 131072  # 128 KB

engine:
  type: helia-rt
  config:
    variant: release-with-logs
    source:
      repo: AmbiqAI/helia-rt
      ref: HeliaRT-v1.7.0

target:
  board: apollo510_evb
  toolchain: arm-none-eabi-gcc
  # jlink_serial: "1160002255"  # select J-Link by S/N (omit for auto-detect)

profiling:
  pmu_presets: [basic_cpu, memory, mve]
  per_layer: true
  iterations: 5
  warmup: 2

power:
  enabled: true
  driver: joulescope          # auto-detects JS110 or JS220
  mode: external
  duration_s: 30
  io_voltage: 1.8
  sync_gpio_pin: 10

output:
  format: csv
  dir: ./results
  model_explorer: true
