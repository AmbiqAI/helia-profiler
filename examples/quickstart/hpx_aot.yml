# heliaPROFILER quickstart — heliaAOT engine
# Profiles a KWS (keyword spotting) DS-CNN model using the AOT compiler.
# All results land in this folder under ./results_aot/
model:
  path: kws_model.tflite
  arena_size: 131072          # 128 KB tensor arena

engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model
    # cmsis_nn_path is auto-resolved from GitHub (AmbiqAI/ns-cmsis-nn).
    # Override with CMSIS_NN_PATH env var or uncomment below for a local checkout:
    # cmsis_nn_path: /path/to/ns-cmsis-nn

target:
  board: apollo510_evb
  toolchain: arm-none-eabi-gcc

profiling:
  pmu_presets: [basic_cpu]    # lightweight — just cycle counts + IPC
  per_layer: true
  iterations: 3
  warmup: 1

power:
  enabled: false

output:
  format: csv
  dir: ./results_aot
