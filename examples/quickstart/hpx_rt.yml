# heliaPROFILER quickstart — heliaRT interpreter engine
# Profiles the same KWS model using the heliaRT runtime (TFLM-based).
# Results land in ./results/results_rt/
model:
  path: kws_model.tflite
  arena_size: 131072          # 128 KB tensor arena

engine:
  type: helia-rt
  config:
    variant: release-with-logs

target:
  board: apollo510_evb
  toolchain: arm-none-eabi-gcc

profiling:
  pmu_presets: [basic_cpu, memory]   # cycles + cache metrics
  per_layer: true
  iterations: 3
  warmup: 1

power:
  enabled: false

output:
  format: csv
  dir: ./results/results_rt
