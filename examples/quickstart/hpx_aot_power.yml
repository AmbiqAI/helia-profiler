# heliaPROFILER quickstart — AOT + Joulescope power capture
# Same AOT profile as hpx_aot.yml but with Joulescope energy measurement.
# Requires a Joulescope JS110/JS220 inline with the EVB power supply.
model:
  path: kws_model.tflite
  arena_size: 131072

engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model
    cmsis_nn_path: ../../../nsx-modules/ns-cmsis-nn

target:
  board: apollo510_evb
  toolchain: arm-none-eabi-gcc

profiling:
  pmu_presets: [basic_cpu]
  per_layer: true
  iterations: 3
  warmup: 1

power:
  enabled: true
  driver: joulescope
  mode: external
  duration_s: 20
  io_voltage: 1.8
  sync_gpio_pin: 10

output:
  format: csv
  dir: ./results_aot_power
