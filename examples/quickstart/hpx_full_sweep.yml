# heliaPROFILER quickstart — full PMU sweep (all counters)
# Runs the AOT-compiled model with every available PMU counter category.
# Generates a rich dataset for Model Explorer overlays.
model:
  path: kws_model.tflite
  arena_size: 131072

engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model
    # cmsis_nn_path is auto-resolved from the NSX registry.
    # Override with CMSIS_NN_PATH env var or uncomment below for a local checkout:
    # cmsis_nn_path: /path/to/ns-cmsis-nn

target:
  board: apollo510_evb
  toolchain: arm-none-eabi-gcc

profiling:
  pmu_counters:
    cpu: all
    memory: all
    mve: all
  per_layer: true
  iterations: 5
  warmup: 2

power:
  enabled: false

output:
  format: csv
  dir: ./results_full_sweep
  model_explorer: true
  detailed: true
