# Temp config to verify nsx-core decomposition (R4) — AOT engine, Apollo4P.
# No Apollo4 hardware available: flash will fail, but build+link validates the
# nsx-core restructure on the R4 SDK.
model:
  path: kws_model.tflite
  arena_size: 131072

engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model

target:
  board: apollo4p_evb
  toolchain: arm-none-eabi-gcc

profiling:
  pmu_presets: [basic_cpu]
  per_layer: true
  iterations: 3
  warmup: 1

output:
  format: csv
  dir: ./results/results_verify_r4
