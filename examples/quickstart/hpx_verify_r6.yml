# Temp config to verify nsx-core decomposition (R6) against the actual staged
# board surface: AT110 FPGA.
model:
  path: kws_model.tflite
  arena_size: 131072

engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model

target:
  board: atomiq110_fpga_turbo
  toolchain: arm-none-eabi-gcc

profiling:
  pmu_presets: [basic_cpu]
  per_layer: true
  iterations: 3
  warmup: 1

output:
  format: csv
  dir: ./results_verify_r6
