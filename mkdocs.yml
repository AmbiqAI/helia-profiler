site_name: heliaPROFILER
site_description: Profile LiteRT models on Ambiq Apollo hardware
repo_url: https://github.com/AmbiqAI/helia-profiler
repo_name: AmbiqAI/helia-profiler

theme:
  name: material
  favicon: assets/heliaprofiler-icon.png
  logo: assets/heliaprofiler-icon.png
  icon:
    repo: fontawesome/brands/github
    admonition:
      tip: material/lightbulb-outline
      info: material/information-outline
      warning: material/alert-outline
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: SF Mono, JetBrains Mono
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AmbiqAI/helia-profiler
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: "#"
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-\.]+'
  - tags
nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Installation: getting-started/install.md
      - First Profile: getting-started/first-profile.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Configuration: guide/configuration.md
      - Inference Engines: guide/engines.md
      - Toolchains: guide/toolchains.md
      - Boards & Platforms: guide/boards.md
      - Capture Transports: guide/transports.md
      - Memory Placement: guide/memory.md
      - PMU Counters: guide/pmu-counters.md
      - Power Measurement: guide/power.md
      - Model Explorer Overlays: guide/model-explorer.md
      - Output & Results: guide/output.md
  - Examples:
      - Overview: examples/index.md
      - Basic Profiling: examples/basic-profiling.md
      - Per-Layer Breakdown: examples/per-layer.md
      - Engine Comparison: examples/engine-comparison.md
      - Toolchain Comparison: examples/toolchain-comparison.md
      - Power Profiling: examples/power-profiling.md
  - Architecture:
      - Overview: architecture/index.md
      - Pipeline & Stages: architecture/pipeline.md
      - Engine Adapters: architecture/engine-adapters.md
      - Firmware Generation: architecture/firmware.md
      - Data Capture: architecture/capture.md
      - Contributing an Engine: architecture/adding-an-engine.md
  - CLI Reference:
      - Overview: reference/index.md
      - hpx profile: reference/profile.md
      - hpx doctor: reference/doctor.md
      - hpx boards: reference/boards.md
      - hpx engines: reference/engines.md
      - hpx probes: reference/probes.md
      - hpx ports: reference/ports.md
      - hpx target: reference/target.md
