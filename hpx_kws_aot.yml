# heliaPROFILER config — KWS model via heliaAOT, ALL PMU counters
model:
  path: tests/fixtures/kws_ref_model.tflite
  arena_size: 131072  # 128 KB

engine:
  type: helia-aot
  config:
    prefix: hpx
    module_name: hpx_model
    cmsis_nn_path: ../nsx-modules/ns-cmsis-nn

target:
  board: apollo510_evb
  toolchain: arm-none-eabi-gcc

profiling:
  pmu_counters:
    cpu: all
    memory: all
    mve: all
  per_layer: true
  iterations: 5
  warmup: 2

power:
  enabled: false

output:
  format: csv
  dir: ./results
  model_explorer: true
