name: Publish Python package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-python-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate version tag and ancestry
        id: version
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Publishing requires selecting an existing version tag, not ${GITHUB_REF}."
            exit 1
          fi

          package_version=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          source_version=$(python3 -c 'import runpy; print(runpy.run_path("src/helia_profiler/_version.py")["__version__"])')
          if [[ "${source_version}" != "${package_version}" ]]; then
            echo "Source version ${source_version} does not match package version ${package_version}."
            exit 1
          fi

          expected_tag="v${package_version}"
          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

          git fetch origin "${DEFAULT_BRANCH}"
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${DEFAULT_BRANCH}"; then
            echo "Release commit ${GITHUB_SHA} is not contained in origin/${DEFAULT_BRANCH}."
            exit 1
          fi

          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"

  build:
    needs: validate-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Build and validate distributions
        env:
          PACKAGE_VERSION: ${{ needs.validate-release.outputs.version }}
        run: |
          uv python install 3.11
          uv sync --locked --python 3.11 --group release
          uv build --out-dir dist
          uv run --group release twine check --strict dist/*
          uv run --group release python tools/verify_distribution.py \
            dist --expected-version "${PACKAGE_VERSION}"

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  verify-install:
    needs: [validate-release, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        distribution: [wheel, sdist]

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Install and smoke-test distribution
        env:
          DISTRIBUTION: ${{ matrix.distribution }}
          PACKAGE_VERSION: ${{ needs.validate-release.outputs.version }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          uv venv --python "${PYTHON_VERSION}" .release-venv
          if [[ "${DISTRIBUTION}" == "wheel" ]]; then
            packages=(dist/*.whl)
          else
            packages=(dist/*.tar.gz)
          fi
          if [[ "${#packages[@]}" -ne 1 ]]; then
            echo "Expected exactly one ${DISTRIBUTION} distribution."
            exit 1
          fi
          uv pip install --python .release-venv/bin/python "${packages[0]}"
          .release-venv/bin/hpx --version | grep -F "hpx ${PACKAGE_VERSION}"
          env -u SEGGER_RTT_PATH .release-venv/bin/python -c \
            'from helia_profiler.firmware import _find_segger_rtt_dir; assert _find_segger_rtt_dir().name == "segger_rtt"'

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch'
    needs: [validate-release, build, verify-install]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/helia-profiler
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

  publish-pypi:
    if: github.event_name == 'release'
    needs: [validate-release, build, verify-install]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/helia-profiler
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
