name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_pr: ${{ steps.release.outputs.pr }}

    steps:
      - name: Create or update release
        id: release
        uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Pull requests opened with GITHUB_TOKEN do not trigger pull_request
      # workflows, so explicitly run CI on the Release Please branch.
      - name: Dispatch CI for release pull request
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          branch=$(printf '%s' "${PR_JSON}" | jq -r '.headBranchName')
          gh workflow run ci.yml --ref "${branch}" --repo "${GITHUB_REPOSITORY}"

  build:
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true') }}
    needs: release-please
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || needs.release-please.outputs.tag_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Validate package version
        id: version
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          package_version=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          source_version=$(python3 -c 'import runpy; print(runpy.run_path("src/helia_profiler/_version.py")["__version__"])')
          if [[ "${source_version}" != "${package_version}" ]]; then
            echo "Source version ${source_version} does not match package version ${package_version}."
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${RELEASE_TAG}" != "v${package_version}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match package version ${package_version}."
            exit 1
          fi
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"

      - name: Build and validate distributions
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          uv python install 3.11
          uv build --out-dir dist
          python3 tools/verify_distribution.py dist --expected-version "${PACKAGE_VERSION}"

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  verify-install:
    if: needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        distribution: [wheel, sdist]

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Install and smoke-test distribution
        env:
          DISTRIBUTION: ${{ matrix.distribution }}
          PACKAGE_VERSION: ${{ needs.build.outputs.version }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          uv venv --python "${PYTHON_VERSION}" .release-venv
          if [[ "${DISTRIBUTION}" == "wheel" ]]; then
            packages=(dist/*.whl)
          else
            packages=(dist/*.tar.gz)
          fi
          if [[ "${#packages[@]}" -ne 1 ]]; then
            echo "Expected exactly one ${DISTRIBUTION} distribution."
            exit 1
          fi
          uv pip install --python .release-venv/bin/python "${packages[0]}"
          .release-venv/bin/hpx --version | grep -F "hpx ${PACKAGE_VERSION}"
          env -u SEGGER_RTT_PATH .release-venv/bin/python -c \
            'from helia_profiler.firmware import _find_segger_rtt_dir; assert _find_segger_rtt_dir().name == "segger_rtt"'

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && needs.verify-install.result == 'success'
    needs: [build, verify-install]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/helia-profiler
    permissions:
      id-token: write

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        run: >-
          uv publish
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/
          --trusted-publishing always
          dist/*

  publish-pypi:
    if: github.event_name == 'push' && needs.release-please.outputs.release_created == 'true' && needs.verify-install.result == 'success'
    needs: [release-please, build, verify-install]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/helia-profiler
    permissions:
      id-token: write

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish distributions to PyPI
        run: uv publish --trusted-publishing always dist/*
