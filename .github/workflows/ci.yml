name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------
  # Lint — runs once on Linux
  # ---------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub auth (higher API rate limits)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global \
            url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf \
            "https://github.com/"

      - name: Install lint dependencies
        run: uv sync --group lint

      - name: Run ruff lint
        run: uv run --group lint ruff check .

  # ---------------------------------------------------------------
  # Unit tests — run on all three platforms
  # ---------------------------------------------------------------
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure GitHub auth (higher API rate limits)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global \
            url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf \
            "https://github.com/"

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run pytest
        run: uv run --group test pytest tests/ -q

  # ---------------------------------------------------------------
  # Gate — single required-check for branch protection
  # ---------------------------------------------------------------
  lint-and-test:
    if: always()
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Decide status
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] ||
             [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
