# heliaPROFILER config — KWS model, ALL PMU counters
model:
  path: tests/fixtures/kws_ref_model.tflite
  arena_size: 131072  # 128 KB

engine:
  type: helia-rt
  config:
    variant: release-with-logs
    # Resolution (first match wins):
    #   dist_path: /local/path/to/heliart/dist   # local override
    #   source:                                   # GitHub release download
    #     repo: AmbiqAI/helia-rt                  # default repo
    #     ref: HeliaRT-v1.7.0                     # tag, branch, or version
    #   (omit both to auto-download pinned version from AmbiqAI/helia-rt)
    source:
      repo: AmbiqAI/helia-rt
      ref: HeliaRT-v1.7.0

target:
  board: apollo510_evb
  toolchain: arm-none-eabi-gcc

profiling:
  pmu_counters:
    cpu: all
    memory: all
    mve: all
  per_layer: true
  iterations: 5
  warmup: 2

power:
  enabled: false

output:
  format: csv
  dir: ./results
  model_explorer: true
